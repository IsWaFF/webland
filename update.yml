---
- name: Обновление системы
  hosts: webservers
  become: yes

  tasks:
    - name: Обновить кэш apt и все установленные пакеты
      apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Проверить, требуется ли перезагрузка (например, после обновления ядра)
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Перезагрузить сервер, если это необходимо
      reboot:
        msg: "Перезагрузка инициирована Ansible после обновления пакетов"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
      when: reboot_required_file.stat.exists
