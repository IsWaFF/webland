name: Fast Docker Deploy
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t webland-nginx .

      - name: Deploy Container
        run: |
          docker stop webland-app || true
          docker rm webland-app || true
          
          docker run -d \
            --name webland-app \
            --restart always \
            -p 80:80 \
            webland-nginx
            
      - name: Cleanup
        run: |
          docker image prune -f